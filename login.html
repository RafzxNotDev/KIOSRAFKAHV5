<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Warungan POS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f5f7fb;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            background: #fff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,.06);
        }
        .login-card h3 {
            font-weight: 700;
            color: #2563eb;
            text-align: center;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h3>🛒 KIOS RAFKAH</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="fw-bold mb-1">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Masukkan email..." required>
            </div>
            <div class="mb-3">
                <label class="fw-bold mb-1">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Masukkan password..." required>
            </div>
            <p id="status" class="text-center fw-bold"></p>
            <button type="submit" id="loginBtn" class="btn btn-primary w-100 py-2">LOGIN</button>
        </form>
    </div>

    <!-- Firebase & Auth Script -->
    <script type="module" src="firebase.js"></script>
    <script type="module" src="auth.js"></script>

</body>
</html>
